[target.'cfg(all())']
rustflags = [

#    "-W", "clippy::pedantic",

    "-W", "clippy::cast_possible_truncation",
    "-W", "clippy::cast_possible_wrap",
    "-W", "clippy::cast_sign_loss",
    "-W", "clippy::cast_precision_loss",

    "-A", "clippy::too_many_arguments",   # disable globally
    "-A", "clippy::collapsible_if",   # disable globally
    "-A", "clippy::derivable_impls",   # disable globally
    "-A", "clippy::len_zero",   # disable globally
    "-A", "clippy::manual_range_contains",   # disable globally
]

